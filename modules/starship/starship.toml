# Starship config - cendre theme

format = """
$directory$git_branch$git_status$conda$nodejs$python$rust$golang $fill$cmd_duration$time
$character"""

[character]
success_symbol = "[❯](bold #ff5555)"
error_symbol   = "[❯](bold #ff5555)"

[directory]
style           = "bold #ffc799"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style  = "#888888"
format = "[$symbol$branch]($style) "

[git_status]
style    = "#ff5555"
format   = "([$all_status$ahead_behind]($style) )"
ahead    = "⇡${count}"
behind   = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged   = "+${count}"
untracked = "?${count}"
deleted  = "✘${count}"

[conda]
style  = "#c8c8c8"
format = "[$symbol$environment]($style) "
symbol = " "

[nodejs]
style  = "#c8c8c8"
format = "[$symbol($version)]($style) "
symbol = " "

[python]
style  = "#c8c8c8"
format = "[$symbol($version)]($style) "
symbol = " "

[rust]
style  = "#c8c8c8"
format = "[$symbol($version)]($style) "
symbol = " "

[golang]
style  = "#c8c8c8"
format = "[$symbol($version)]($style) "
symbol = " "

[cmd_duration]
min_time = 2000
style    = "#555555"
format   = "[$duration]($style) "

[time]
disabled  = false
style     = "#555555"
format    = "[$time]($style)"
time_format = "%H:%M"

[fill]
symbol = " "

[line_break]
disabled = true

# AeroSpace config - bindings handled by skhd (left Alt only)

[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.right      = 8
outer.top        = 8
outer.bottom     = 8

[mode.main.binding]

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height -50'
k = 'resize height +50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'


# tmux config - Vesper theme, vim-centric

# Prefix: Ctrl-a (primary) and Cmd-a via Ghostty remap (M-a)
unbind C-b
set -g prefix C-a
set -g prefix2 M-a
bind C-a send-prefix
bind M-a send-prefix -2

# True color passthrough for Ghostty
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-overrides ",*:Tc"

# Critical for Neovim
set -g escape-time 0
set -g focus-events on

# General
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g set-clipboard on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits and window management — no prefix, via Ghostty Cmd remaps
bind -n M-d split-window -h -c "#{pane_current_path}"  # Cmd+d   → vertical split
bind -n M-D split-window -v -c "#{pane_current_path}"  # Cmd+D   → horizontal split
bind -n M-t new-window   -c "#{pane_current_path}"     # Cmd+t   → new window
bind -n M-w kill-pane                                  # Cmd+w   → close pane
bind -n M-k send-keys C-l \; clear-history             # Cmd+k   → clear screen + scrollback
unbind '"'
unbind %

# Also keep prefix-based aliases for muscle memory
bind d split-window -h -c "#{pane_current_path}"
bind D split-window -v -c "#{pane_current_path}"
bind t new-window   -c "#{pane_current_path}"
bind w kill-pane

# AZERTY window switching: Cmd+physical-number-row (& é " ' ( § è ! ç à)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10

# Pane resize with arrow keys
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# Vi copy mode
set -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# Move window left/right (prefix + , / .)
bind -r h swap-window -d -t -1
bind -r l swap-window -d -t +1

# Move window to specific position: prefix + m, then type number
bind m command-prompt -p "Move window to position:" "swap-window -d -t '%%'"

# Kill without confirmation
bind x kill-pane
bind X kill-window

# ─── vim-tmux-navigator (manual bindings, no TPM needed) ─────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ─── Plugins ───────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect / continuum
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

# Session picker
bind f display-popup -E "$HOME/.config/tmux/scripts/tmux-sessionizer"
bind F display-popup -E "$HOME/.config/tmux/scripts/tmux-sessionizer --sessions"

# Session harpoon
bind a run-shell  "$HOME/.config/tmux/scripts/tmux-harpoon add"
bind e display-popup -E "$HOME/.config/tmux/scripts/tmux-harpoon menu"

# Jump to pinned session — digits and AZERTY physical keys (& é " ' ( § è ! ç à)
unbind '&' ; bind '&' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 1"
unbind 'é' ; bind 'é' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 2"
unbind '"' ; bind '"' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 3"
unbind "'" ; bind "'" run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 4"
unbind '(' ; bind '(' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 5"
unbind '§' ; bind '§' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 6"
unbind 'è' ; bind 'è' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 7"
unbind '!' ; bind '!' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 8"
unbind 'ç' ; bind 'ç' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 9"
unbind 'à' ; bind 'à' run-shell "$HOME/.config/tmux/scripts/tmux-harpoon jump 10"

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'

# ─── Cendre theme (inlined — avoids run-shell timing issues with TPM) ───
set -g  status-style                 "bg=#101010,fg=#cccccc"
set -g  status-left-length           30
set -g  status-position              bottom
set -g  status-justify               left
set -gw window-status-style          "bg=#101010,fg=#ffffff"
set -gw window-status-current-style  "bg=#ffffff,fg=#000000,bold"
set -gw window-status-separator      " "
set -gw window-status-format         " #I: #W "
set -gw window-status-current-format " #I: #W "
set -g  pane-border-style            "fg=#333333"
set -g  pane-active-border-style     "fg=#ffc799"
set -g  message-style                "bg=#000000,fg=#ffffff"
set -g  message-command-style        "bg=#000000,fg=#ffffff"
set -gw copy-mode-match-style         "bg=#ffc799,fg=#000000"
set -gw copy-mode-current-match-style "bg=#ff6666,fg=#000000"
set -g  status-left  "#[bg=#ff6666,fg=#000000,bold] #S #[bg=#000000,fg=#cccccc]"
set -g  status-right "#[bg=#101010,fg=#555555] %H:%M #[bg=#ff6666,fg=#000000,bold]   #(~/.config/tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh) 󰍛  #(~/.config/tmux/plugins/tmux-cpu/scripts/ram_percentage.sh) "

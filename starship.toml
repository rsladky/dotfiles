# Starship config - minimal, Vesper-inspired

format = """
$directory$git_branch$git_status$conda$nodejs$python$rust$golang $fill$cmd_duration$time
$character"""

[character]
success_symbol = "[❯](bold #ff8080)"
error_symbol   = "[❯](bold #ff8080)"

[directory]
style           = "bold #ffc799"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style  = "#65737e"
format = "[$symbol$branch]($style) "

[git_status]
style    = "#ff8080"
format   = "([$all_status$ahead_behind]($style) )"
ahead    = "⇡${count}"
behind   = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged   = "+${count}"
untracked = "?${count}"
deleted  = "✘${count}"

[conda]
style  = "#82d9c2"
format = "[$symbol$environment]($style) "
symbol = " "

[nodejs]
style  = "#82d9c2"
format = "[$symbol($version)]($style) "
symbol = " "

[python]
style  = "#82d9c2"
format = "[$symbol($version)]($style) "
symbol = " "

[rust]
style  = "#ffcfa8"
format = "[$symbol($version)]($style) "
symbol = " "

[golang]
style  = "#82d9c2"
format = "[$symbol($version)]($style) "
symbol = " "

[cmd_duration]
min_time = 2000
style    = "#505050"
format   = "[$duration]($style) "

[time]
disabled  = false
style     = "#505050"
format    = "[$time]($style)"
time_format = "%H:%M"

[fill]
symbol = " "

[line_break]
disabled = true
